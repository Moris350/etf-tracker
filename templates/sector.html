{% extends "layout.html" %}

{% block content %}
<style>
    /* ─── Page Layout ─── */
    .sector-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    .sector-title-block h1 {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-primary);
    }
    .sector-title-block .subtitle {
        color: var(--text-muted);
        font-size: 13px;
        margin-top: 4px;
    }
    .header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    /* ─── Analytics Strip ─── */
    .analytics-strip {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }
    .analytics-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        transition: border-color 0.2s;
    }
    .analytics-card:hover { border-color: rgba(255,255,255,0.12); }
    .analytics-card .period {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }
    .analytics-card .value {
        font-size: 18px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
    }
    .analytics-card .change {
        font-size: 12px;
        font-weight: 500;
        margin-top: 2px;
    }
    .up { color: var(--accent-green); }
    .down { color: var(--accent-red); }
    .flat { color: var(--text-muted); }

    /* ─── Chart Area ─── */
    .chart-panel {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        overflow: hidden;
    }
    .chart-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border-color);
    }
    .range-buttons {
        display: flex;
        gap: 4px;
    }
    .range-btn {
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-secondary);
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.15s;
    }
    .range-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .range-btn.active {
        background: rgba(59,130,246,0.15);
        border-color: rgba(59,130,246,0.3);
        color: var(--accent-blue);
    }
    .chart-tools {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .chart-canvas-wrap {
        padding: 20px;
        height: 540px;
        position: relative;
    }

    /* ─── Crosshair tooltip ─── */
    .chart-tooltip-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 4px;
    }

    /* ─── Loading overlay ─── */
    #chartLoading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 540px;
        color: var(--text-secondary);
        font-size: 14px;
    }

    @media (max-width: 900px) {
        .analytics-strip { grid-template-columns: repeat(3, 1fr); }
        .sector-header { flex-direction: column; gap: 16px; }
    }
    @media (max-width: 500px) {
        .analytics-strip { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<!-- Header -->
<div class="sector-header">
    <div class="sector-title-block">
        <h1 id="pageSectorTitle">{{ sector_title }}</h1>
        <div class="subtitle" id="pageSubtitle">טוען נתונים...</div>
    </div>
    <div class="header-actions">
        <button class="btn btn-ghost" onclick="resetZoom()">↺ איפוס תצוגה</button>
        <button class="btn btn-primary" id="updateBtn" onclick="forceUpdate()">⟳ עדכן נתונים</button>
    </div>
</div>

<div id="errorMsg"></div>

<!-- Analytics Strip -->
<div class="analytics-strip" id="analyticsStrip">
    <div class="analytics-card">
        <div class="period">יומי</div>
        <div class="value" id="stat_1d">—</div>
        <div class="change" id="stat_1d_pct">—</div>
    </div>
    <div class="analytics-card">
        <div class="period">שבועי</div>
        <div class="value" id="stat_1w">—</div>
        <div class="change" id="stat_1w_pct">—</div>
    </div>
    <div class="analytics-card">
        <div class="period">חודשי</div>
        <div class="value" id="stat_1m">—</div>
        <div class="change" id="stat_1m_pct">—</div>
    </div>
    <div class="analytics-card">
        <div class="period">3 חודשים</div>
        <div class="value" id="stat_3m">—</div>
        <div class="change" id="stat_3m_pct">—</div>
    </div>
    <div class="analytics-card">
        <div class="period">חצי שנה</div>
        <div class="value" id="stat_6m">—</div>
        <div class="change" id="stat_6m_pct">—</div>
    </div>
    <div class="analytics-card">
        <div class="period">שנה</div>
        <div class="value" id="stat_1y">—</div>
        <div class="change" id="stat_1y_pct">—</div>
    </div>
</div>

<!-- Chart Panel -->
<div class="chart-panel">
    <div class="chart-toolbar">
        <div class="range-buttons">
            <button class="range-btn" onclick="applyRange(7, this)">7Y</button>
            <button class="range-btn" onclick="applyRange(30, this)">1M</button>
            <button class="range-btn" onclick="applyRange(90, this)">3M</button>
            <button class="range-btn" onclick="applyRange(180, this)">6M</button>
            <button class="range-btn" onclick="applyRange(365, this)">1Y</button>
            <button class="range-btn" onclick="applyRange(730, this)">2Y</button>
            <button class="range-btn active" onclick="applyRange(null, this)">הכל</button>
        </div>
        <div class="chart-tools">
            <span class="chart-tooltip-label" id="hoverInfo"></span>
        </div>
    </div>
    <div id="chartLoading">
        <div class="spinner"></div>
        <span>טוען נתונים היסטוריים...</span>
    </div>
    <div class="chart-canvas-wrap" id="chartWrapper" style="display:none;">
        <canvas id="sectorChart"></canvas>
    </div>
</div>

<script>
    const sectorId   = {{ sector_id | tojson | safe }};
    const lineColor  = {{ color | tojson | safe }};
    const unitTitle  = {{ unit_title | tojson | safe }};

    let chartInstance = null;
    let allDates = [];
    let allValues = [];

    /* ── Helpers ── */
    function parseDate(str) { return new Date(str); }

    function findClosestValue(targetDate, daysBack) {
        // target = latest date minus daysBack calendar days
        const t = new Date(targetDate);
        t.setDate(t.getDate() - daysBack);
        // find index of closest date >= t in allDates
        for (let i = allDates.length - 1; i >= 0; i--) {
            if (parseDate(allDates[i]) <= t) return allValues[i];
        }
        return null;
    }

    function formatChange(current, reference) {
        if (reference == null || reference === 0) return { text: '—', cls: 'flat' };
        const diff = current - reference;
        const pct  = (diff / reference) * 100;
        const sign = diff >= 0 ? '+' : '';
        const cls  = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
        return { text: `${sign}${pct.toFixed(2)}%`, cls };
    }

    function fillStatCard(id, current, reference) {
        const el = document.getElementById(id);
        const pctEl = document.getElementById(id + '_pct');
        if (!el) return;

        const diff = reference != null ? (current - reference) : null;
        const sign = diff != null && diff >= 0 ? '+' : '';
        el.textContent = current != null ? current.toFixed(2) : '—';

        if (reference != null) {
            const ch = formatChange(current, reference);
            pctEl.textContent = ch.text;
            pctEl.className = 'change ' + ch.cls;
        } else {
            pctEl.textContent = 'נתון חסר';
            pctEl.className = 'change flat';
        }
    }

    function computeAnalytics() {
        if (allValues.length === 0) return;
        const latest = allValues[allValues.length - 1];
        const latestDate = allDates[allDates.length - 1];

        fillStatCard('stat_1d',  latest, allValues.length > 1 ? allValues[allValues.length - 2] : null);
        fillStatCard('stat_1w',  latest, findClosestValue(latestDate, 7));
        fillStatCard('stat_1m',  latest, findClosestValue(latestDate, 30));
        fillStatCard('stat_3m',  latest, findClosestValue(latestDate, 90));
        fillStatCard('stat_6m',  latest, findClosestValue(latestDate, 180));
        fillStatCard('stat_1y',  latest, findClosestValue(latestDate, 365));

        const latestParts = latestDate.split('-');
        document.getElementById('pageSubtitle').textContent =
            `${unitTitle} · מעודכן ל: ${latestParts[2]}/${latestParts[1]}/${latestParts[0]}`;
    }

    /* ── Range filter ── */
    function applyRange(days, btn) {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (!chartInstance) return;

        if (days === null) {
            chartInstance.resetZoom();
            return;
        }

        const last = parseDate(allDates[allDates.length - 1]);
        const from = new Date(last);
        from.setDate(from.getDate() - days);

        chartInstance.zoomScale('x', { min: from.getTime(), max: last.getTime() }, 'none');
    }

    /* ── Reset zoom ── */
    function resetZoom() {
        if (chartInstance) chartInstance.resetZoom();
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.range-btn:last-child').classList.add('active');
    }

    /* ── Build gradient ── */
    function buildGradient(ctx, color) {
        const gradient = ctx.createLinearGradient(0, 0, 0, 500);
        gradient.addColorStop(0, color.replace(')', ', 0.25)').replace('rgb', 'rgba'));
        gradient.addColorStop(1, color.replace(')', ', 0)').replace('rgb', 'rgba'));
        return gradient;
    }

    /* ── Load & render ── */
    function loadChartData() {
        fetch('/data')
            .then(r => r.json())
            .then(data => {
                document.getElementById('chartLoading').style.display = 'none';
                document.getElementById('chartWrapper').style.display = 'block';

                if (!data[sectorId] || !data[sectorId].master_dates || !data[sectorId].master_dates.length) {
                    document.getElementById('errorMsg').textContent = 'אין נתונים זמינים עבור סקטור זה.';
                    document.getElementById('errorMsg').style.display = 'block';
                    return;
                }

                allDates  = data[sectorId].master_dates;
                const rawDatasets = data[sectorId].datasets;
                
                // Calculate aggregated sums per day for the Analytics Strip
                allValues = new Array(allDates.length).fill(0);
                for (let i = 0; i < allDates.length; i++) {
                    let daySum = null;
                    for (let ds of rawDatasets) {
                        if (ds.data[i] !== null) {
                            daySum = (daySum || 0) + ds.data[i];
                        }
                    }
                    allValues[i] = daySum;
                }

                computeAnalytics();

                const canvas = document.getElementById('sectorChart');
                const ctx = canvas.getContext('2d');

                // Map predefined dynamic colors for each fund
                const colorPalette = [
                    lineColor,
                    '#ef4444', // Red
                    '#f59e0b', // Amber
                    '#10b981', // Emerald
                    '#6366f1'  // Indigo
                ];

                const chartDatasets = rawDatasets.map((ds, index) => {
                    const dsHexColor = colorPalette[index % colorPalette.length];
                    const r = parseInt(dsHexColor.slice(1,3), 16) || 59;
                    const g = parseInt(dsHexColor.slice(3,5), 16) || 130;
                    const b = parseInt(dsHexColor.slice(5,7), 16) || 246;
                    const dsGradient = ctx.createLinearGradient(0, 0, 0, 500);
                    dsGradient.addColorStop(0,   `rgba(${r},${g},${b}, 0.28)`);
                    dsGradient.addColorStop(0.7, `rgba(${r},${g},${b}, 0.05)`);
                    dsGradient.addColorStop(1,   `rgba(${r},${g},${b}, 0)`);
                    
                    return {
                        label: ds.label,
                        data: ds.data,
                        borderColor: dsHexColor,
                        backgroundColor: dsGradient,
                        fill: true,
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: dsHexColor,
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2,
                    };
                });

                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: allDates,
                        datasets: chartDatasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 400 },
                        interaction: { mode: 'index', intersect: false },
                        spanGaps: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(15,17,23,0.95)',
                                borderColor: 'rgba(255,255,255,0.08)',
                                borderWidth: 1,
                                titleColor: '#9aa0b2',
                                bodyColor: '#e8eaed',
                                titleFont: { family: 'Inter', size: 11 },
                                bodyFont: { family: 'Inter', size: 13, weight: '600' },
                                padding: 12,
                                cornerRadius: 8,
                                displayColors: false,
                                callbacks: {
                                    title: items => {
                                        const idx = items[0].dataIndex;
                                        const d = new Date(allDates[idx]);
                                        return d.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
                                    },
                                    label: item => `${item.dataset.label}: ${item.raw ? item.raw.toFixed(3) : '—'} ${unitTitle}`
                                }
                            },
                            zoom: {
                                pan: { enabled: true, mode: 'x', threshold: 5 },
                                zoom: {
                                    wheel: { enabled: true, speed: 0.08 },
                                    pinch: { enabled: true },
                                    mode: 'x',
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: {
                                    parser: 'yyyy-MM-dd',
                                    tooltipFormat: 'dd/MM/yyyy',
                                    displayFormats: {
                                        day:   'dd/MM',
                                        week:  'dd/MM',
                                        month: 'MM/yyyy',
                                        year:  'yyyy'
                                    }
                                },
                                grid: {
                                    color: 'rgba(255,255,255,0.04)',
                                    drawBorder: false,
                                },
                                ticks: {
                                    color: '#5f6580',
                                    font: { family: 'Inter', size: 11 },
                                    maxRotation: 0,
                                }
                            },
                            y: {
                                position: 'right',
                                grid: {
                                    color: 'rgba(255,255,255,0.04)',
                                    drawBorder: false,
                                },
                                ticks: {
                                    color: '#5f6580',
                                    font: { family: 'Inter', size: 11 },
                                    callback: v => v.toFixed(2)
                                },
                                title: {
                                    display: true,
                                    text: unitTitle,
                                    color: '#5f6580',
                                    font: { family: 'Inter', size: 11 }
                                }
                            }
                        }
                    }
                });

                // Hover crosshair info
                canvas.addEventListener('mousemove', evt => {
                    const points = chartInstance.getElementsAtEventForMode(evt, 'index', { intersect: false }, true);
                    if (points.length) {
                        const idx = points[0].index;
                        const d = new Date(allDates[idx]);
                        
                        let combinedStr = [];
                        for (let p of points) {
                            if (p.element.$context.raw !== null) {
                                combinedStr.push(`${chartInstance.data.datasets[p.datasetIndex].label}: ${p.element.$context.raw.toFixed(3)}`);
                            }
                        }
                        const v = allValues[idx];
                        const totalStr = v !== null ? v.toFixed(3) : '—';
                        
                        document.getElementById('hoverInfo').textContent =
                            `${d.toLocaleDateString('he-IL')} · סך הכל בסקטור: ${totalStr} | ${combinedStr.join(' · ')}`;
                    }
                });
                canvas.addEventListener('mouseleave', () => {
                    document.getElementById('hoverInfo').textContent = '';
                });
            })
            .catch(err => {
                document.getElementById('chartLoading').style.display = 'none';
                document.getElementById('errorMsg').textContent = 'שגיאה בטעינת נתונים: ' + err.message;
                document.getElementById('errorMsg').style.display = 'block';
            });
    }

    function forceUpdate() {
        const btn = document.getElementById('updateBtn');
        btn.disabled = true;
        btn.textContent = '⟳ מעדכן...';
        fetch('/force-update', { method: 'POST' })
            .then(() => {
                btn.disabled = false;
                btn.textContent = '⟳ עדכן נתונים';
                loadChartData();
            })
            .catch(() => {
                btn.disabled = false;
                btn.textContent = '⟳ עדכן נתונים';
            });
    }

    window.onload = loadChartData;
</script>
{% endblock %}
