<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השוואת צמיחה: הראל מול אי.בי.אי</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { width: 95%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 15px; font-size: 28px; }
        
        .controls-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .update-btn { background-color: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2); }
        .update-btn:hover { background-color: #2980b9; transform: translateY(-2px); box-shadow: 0 6px 8px rgba(41, 128, 185, 0.3); }
        .update-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .reset-btn { background-color: #95a5a6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(149, 165, 166, 0.2); }
        .reset-btn:hover { background-color: #7f8c8d; transform: translateY(-2px); box-shadow: 0 6px 8px rgba(127, 140, 141, 0.3); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .fund-section { display: flex; flex-direction: column; gap: 15px; }
        .stat-card { text-align: center; padding: 20px; border-radius: 8px; border: 1px solid; }
        .ibi-card { background: #fef5e7; border-color: #e67e22; color: #a0522d; }
        .harel-card { background: #e8f8f5; border-color: #1abc9c; color: #117a65; }
        .growth-header { font-size: 20px; font-weight: bold; margin: 0 0 8px 0; }
        .growth-details { font-size: 14px; color: #7f8c8d; margin: 0 0 10px 0; }
        .daily-change { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; background: white; border: 1px solid #ccc; }
        .positive { color: #27ae60; border-color: #27ae60; }
        .negative { color: #c0392b; border-color: #c0392b; }
        .neutral { color: #7f8c8d; }
        .chart-container { position: relative; height: 550px; width: 100%; background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 15px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h1>השוואת צמיחה: הראל (פסיבי) מול אי.בי.אי (אקטיבי)</h1>
        
        <div class="controls-container">
            <button id="updateBtn" class="update-btn" onclick="triggerManualUpdate()">🔄 רענן נתונים מהבורסה עכשיו</button>
            <button class="reset-btn" onclick="resetZoom()">🔍 איפוס תצוגה</button>
        </div>
        
        <div class="dashboard-grid" id="dashboardGrid" style="display: none;">
            <div class="fund-section">
                <div class="stat-card ibi-card">
                    <p class="growth-header" id="ibiGrowthHeader">--</p>
                    <p class="growth-details" id="ibiGrowthDetails">--</p>
                    <div class="daily-change" id="ibiDaily">--</div>
                </div>
                <div class="chart-container"><canvas id="ibiChart"></canvas></div>
            </div>

            <div class="fund-section">
                <div class="stat-card harel-card">
                    <p class="growth-header" id="harelGrowthHeader">--</p>
                    <p class="growth-details" id="harelGrowthDetails">--</p>
                    <div class="daily-change" id="harelDaily">--</div>
                </div>
                <div class="chart-container"><canvas id="harelChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let ibiChartInstance = null;
        let harelChartInstance = null;

        function resetZoom() {
            if (ibiChartInstance) ibiChartInstance.resetZoom();
            if (harelChartInstance) harelChartInstance.resetZoom();
        }

        async function triggerManualUpdate() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = '⏳ שואב נתונים מאתרי הבורסה...';
            
            try {
                const response = await fetch('/force-update', { method: 'POST' });
                const result = await response.json(); 
                
                if(response.ok) {
                    location.reload(); 
                } else {
                    alert('⚠️ שגיאה!\n\n' + result.message);
                    btn.disabled = false;
                    btn.innerText = '🔄 נסה לרענן שוב';
                }
            } catch(error) {
                alert('שגיאת תקשורת חמורה עם השרת המקומי שלך.');
                btn.disabled = false;
                btn.innerText = '🔄 רענן נתונים מהבורסה עכשיו';
            }
        }

        async function renderChart() {
            try {
                const response = await fetch('/data');
                const data = await response.json();
                if (!data.dates || data.dates.length === 0) return;

                const dates = data.dates;
                const currentMonth = dates[dates.length - 1].split('-')[1];
                let startIndex = 0;
                for (let i = 0; i < dates.length; i++) {
                    if (dates[i].split('-')[1] === currentMonth) { startIndex = i; break; }
                }

                // Parse full explicit ISO dates natively into chronological Date objects
                const timeline = dates.map(d => new Date(d));

                function updateDetailedStats(series, headerId, detailsId, dailyId, unitType, isMillionsInCsv) {
                    const validDataInfo = [];
                    for(let i=0; i<series.length; i++) {
                        if (series[i] !== null && series[i] !== undefined && !isNaN(series[i])) {
                            validDataInfo.push({index: i, value: series[i]});
                        }
                    }

                    const headerElem = document.getElementById(headerId);
                    const detailsElem = document.getElementById(detailsId);
                    const dailyElem = document.getElementById(dailyId);
                    
                    if (validDataInfo.length === 0) {
                        headerElem.innerText = `🚀 מתחילת החודש: --`;
                        detailsElem.innerText = `אין מספיק נתונים`;
                        dailyElem.innerText = `אין מספיק נתונים`;
                        dailyElem.className = `daily-change neutral`;
                        return series;
                    }

                    const currentInfo = validDataInfo[validDataInfo.length - 1];
                    const currentVal = currentInfo.value;
                    
                    if (validDataInfo.length === 1) {
                        headerElem.innerText = `🚀 מתחילת החודש: אין מספיק נתונים`;
                        detailsElem.innerText = `ערך נוכחי: ${currentVal.toFixed(2)} ${unitType}`;
                        dailyElem.innerText = `אין מספיק נתונים לשינוי היומי`;
                        dailyElem.className = `daily-change neutral`;
                        return series;
                    }

                    const prevInfo = validDataInfo[validDataInfo.length - 2];
                    const prevVal = prevInfo.value;

                    let startVal = null;
                    for(let i=0; i<validDataInfo.length; i++){
                        if (validDataInfo[i].index >= startIndex) {
                            startVal = validDataInfo[i].value;
                            break;
                        }
                    }
                    if (startVal === null) startVal = validDataInfo[0].value;

                    const growthPercent = (((currentVal / startVal) - 1) * 100).toFixed(2);
                    const rawGrowth = (currentVal - startVal).toFixed(2); 

                    headerElem.innerText = `🚀 מתחילת החודש: ${growthPercent > 0 ? '+' : ''}${growthPercent}%`;
                    detailsElem.innerText = `מ-${startVal.toFixed(2)} ל-${currentVal.toFixed(2)} ${unitType}`;
                
                    if (prevVal && prevVal !== currentVal) {
                        const dailyPercent = (((currentVal / prevVal) - 1) * 100).toFixed(2);
                        const dailyRaw = Math.abs(currentVal - prevVal).toFixed(2);
                        const isPositive = dailyPercent > 0;
                        
                        dailyElem.innerText = `שינוי מאתמול: ${isPositive ? '+' : ''}${dailyPercent}% (${dailyRaw} ${unitType})`;
                        dailyElem.className = `daily-change ${isPositive ? 'positive' : 'negative'}`;
                    } else {
                        dailyElem.innerText = `ללא שינוי מאתמול (0%)`;
                        dailyElem.className = `daily-change neutral`;
                    }
                    return series;
                }

                document.getElementById('dashboardGrid').style.display = 'grid';
                const ibiSeries = updateDetailedStats(data.ibi, 'ibiGrowthHeader', 'ibiGrowthDetails', 'ibiDaily', 'מ\' ש"ח', true);
                const harelSeries = updateDetailedStats(data.harel, 'harelGrowthHeader', 'harelGrowthDetails', 'harelDaily', 'מ\' יח\'', true);

                const commonOptions = { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        zoom: {
                            pan: { enabled: true, mode: 'x' },
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                mode: 'x'
                            }
                        }
                    }, 
                    spanGaps: true 
                };

                ibiChartInstance = new Chart(document.getElementById('ibiChart').getContext('2d'), {
                    type: 'line', data: { labels: timeline, datasets: [{ data: ibiSeries, borderColor: '#e67e22', backgroundColor: 'rgba(230, 126, 34, 0.1)', fill: true, borderWidth: 3, tension: 0.3 }] },
                    options: { ...commonOptions, scales: { x: { type: 'time', time: { unit: 'day', displayFormats: { day: 'dd/MM' } } }, y: { title: { display: true, text: 'מיליוני ש"ח' } } } }
                });

                harelChartInstance = new Chart(document.getElementById('harelChart').getContext('2d'), {
                    type: 'line', data: { labels: timeline, datasets: [{ data: harelSeries, borderColor: '#1abc9c', backgroundColor: 'rgba(26, 188, 156, 0.1)', fill: true, borderWidth: 3, tension: 0.3 }] },
                    options: { ...commonOptions, scales: { x: { type: 'time', time: { unit: 'day', displayFormats: { day: 'dd/MM' } } }, y: { title: { display: true, text: 'מיליוני יחידות' } } } }
                });

            } catch (error) { console.error('Error fetching data:', error); }
        }
        renderChart();
    </script>
</body>
</html>
