<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Sector Tracker | מעקב סקטורים</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d29;
            --bg-card: #1e2235;
            --bg-hover: #252a3a;
            --border-color: rgba(255,255,255,0.06);
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b2;
            --text-muted: #5f6580;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-teal: #14b8a6;
            --accent-purple: #a78bfa;
            --glass: rgba(15,17,23,0.92);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Navbar ── */
        .navbar {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-top {
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .navbar-bottom {
            display: flex;
            gap: 2px;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            transition: all 0.15s ease;
            font-size: 12.5px;
            font-weight: 500;
            white-space: nowrap;
        }
        .nav-links a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .nav-links a.active { color: var(--accent-blue); background: rgba(59,130,246,0.1); }
        .nav-divider {
            width: 1px; height: 20px;
            background: var(--border-color);
            align-self: center;
            margin: 0 4px;
        }

        /* ── Container ── */
        .container { max-width: 1500px; margin: 0 auto; padding: 24px 28px; }

        /* ── Buttons ── */
        .btn {
            border: none; padding: 8px 18px; border-radius: var(--radius-sm);
            cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px;
            font-weight: 500; transition: all 0.2s ease;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        /* ── Cards ── */
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); overflow: hidden; }

        /* ── Tags ── */
        .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
        .tag-green { background: rgba(34,197,94,0.12); color: var(--accent-green); }
        .tag-red   { background: rgba(239,68,68,0.12);  color: var(--accent-red); }
        .tag-neutral { background: rgba(255,255,255,0.06); color: var(--text-muted); }

        /* ── Spinner ── */
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border-color); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading { text-align: center; padding: 80px 0; color: var(--text-secondary); font-size: 14px; }
        #errorMsg { display: none; background: rgba(239,68,68,0.1); color: var(--accent-red); padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid rgba(239,68,68,0.2); margin-bottom: 16px; font-size: 13px; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-top">
            <div class="logo">📊 ETF Sector Tracker · TASE</div>
        </div>
        <div class="navbar-bottom nav-links">
            <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>סקירה</a>
            <div class="nav-divider"></div>
            <a href="/sector/ta35"         {% if active_nav == 'ta35'         %}class="active"{% endif %}>ת"א 35</a>
            <a href="/sector/ta90"         {% if active_nav == 'ta90'         %}class="active"{% endif %}>ת"א 90</a>
            <a href="/sector/ta125"        {% if active_nav == 'ta125'        %}class="active"{% endif %}>ת"א 125</a>
            <div class="nav-divider"></div>
            <a href="/sector/tech"         {% if active_nav == 'tech'         %}class="active"{% endif %}>טכנולוגיה</a>
            <a href="/sector/realestate"   {% if active_nav == 'realestate'   %}class="active"{% endif %}>נדל"ן</a>
            <a href="/sector/banks"        {% if active_nav == 'banks'        %}class="active"{% endif %}>בנקים</a>
            <a href="/sector/construction" {% if active_nav == 'construction' %}class="active"{% endif %}>בנייה</a>
            <a href="/sector/oil"          {% if active_nav == 'oil'          %}class="active"{% endif %}>נפט וגז</a>
            <a href="/sector/harel"        {% if active_nav == 'harel'        %}class="active"{% endif %}>ביטחוניות</a>
            <div class="nav-divider"></div>
            <a href="/sector/ibi"          {% if active_nav == 'ibi'          %}class="active"{% endif %}>IBI נכסים</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
